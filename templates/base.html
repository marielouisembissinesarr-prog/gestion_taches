<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme de Gestion de Tâches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">📊 GestionTâches</a>
            <div class="navbar-nav ms-auto align-items-center">
                {% if user.is_authenticated %}
                    <!-- Options affichées si l'utilisateur est connecté -->
                    <span class="navbar-text me-3 text-light small">Bonjour, <strong>{{ user.username }}</strong></span>
                    <a class="nav-link me-2" href="/">Tableau de bord</a>
                    
                    <!-- Lien direct pour la déconnexion en GET -->
                    <a class="nav-link text-danger fw-bold" href="{% url 'logout' %}">Déconnexion</a>
                {% else %}
                    <!-- Options affichées si l'utilisateur est un visiteur -->
                    <a class="nav-link" href="/login/">Connexion</a>
                    <a class="nav-link" href="/register/">Inscription</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
