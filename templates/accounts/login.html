{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 bg-white p-4 mt-4">
            <div class="card-body">
                <h2 class="h4 fw-bold text-center text-dark mb-4">Connexion à votre espace</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold text-secondary">Nom d'utilisateur</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Ex: amadou12" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold text-secondary">Mot de passe</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Se connecter</button>
                </form>
                
                <hr class="my-4 text-muted">
                <p class="text-center small text-secondary mb-0">
                    Nouveau sur la plateforme ? <a href="/register/" class="text-primary fw-bold text-decoration-none">Créer un compte</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
