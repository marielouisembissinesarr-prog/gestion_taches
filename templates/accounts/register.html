{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 bg-white p-4 mt-3">
            <div class="card-body">
                <h2 class="h4 fw-bold text-center text-dark mb-4">Créer un compte collaborateur</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold text-secondary">Nom d'utilisateur</label>
                        <input type="text" name="username" id="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label small fw-bold text-secondary">Adresse Email</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="exemple@uunk.edu.sn" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label small fw-bold text-secondary">Mot de passe</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label for="password_confirm" class="form-label small fw-bold text-secondary">Confirmer le mot de passe</label>
                        <input type="password" name="password_confirm" id="password_confirm" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">S'inscrire gratuitement</button>
                </form>
                
                <hr class="my-4 text-muted">
                <p class="text-center small text-secondary mb-0">
                    Déjà membre ? <a href="/login/" class="text-primary fw-bold text-decoration-none">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
