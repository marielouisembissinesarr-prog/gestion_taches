<form method="post">{% csrf_token %}
    <p>Êtes-vous sûr de vouloir supprimer définitivement la tâche "{{ tache.titre }}" ?</p>
    <button type="submit" style="background:#dc3545; color:white; padding:10px;">Confirmer la suppression</button>
    <a href="{% url 'projet_detail' tache.projet.id %}">Annuler</a>
</form>
